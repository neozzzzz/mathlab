<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title>MathLab Kids Favicon</title>
  <rect width="64" height="64" rx="16" fill="#ffb37a"/>

  <!-- Outer rounded square (peach/orange bg) -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="#ff9f63"/>
  <rect x="9" y="9" width="46" height="46" rx="12" fill="#ffb27a"/>

  <!-- Star shape base -->
  <g transform="translate(32 32)">
    <path d="M0 -16L4.8-4.8L16 0L4.8 4.8L0 16L-4.8 4.8L-16 0L-4.8-4.8Z" fill="#fff6cd"/>

    <!-- Four colored quadrants with operators -->
    <path d="M0 -14.7L4.2-4.2L4.2 4.2L0 0L0 -14.7Z" fill="#ffd84a"/>
    <path d="M0 0L4.2 4.2L0 14.7L-4.2 4.2L0 0Z" fill="#7bd38c"/>
    <path d="M0 0L-4.2 4.2L-14.7 0L-4.2-4.2L0 0Z" fill="#84c7ff"/>
    <path d="M0 0L-4.2-4.2L0 -14.7L4.2-4.2L0 0Z" fill="#ff9a45"/>

    <!-- Smile -->
    <path d="M-4.8 4c0.9 1.6 2.6 2.6 4.8 2.6s3.9-1 4.8-2.6" fill="none" stroke="#5a3b21" stroke-width="2.2" stroke-linecap="round"/>

    <!-- math operators -->
    <text x="-8.5" y="0" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a3b21" font-weight="800">+</text>
    <text x="8.5" y="0" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a3b21" font-weight="800">−</text>
    <text x="0" y="-8.5" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a3b21" font-weight="800">×</text>
    <text x="0" y="8.5" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="8" fill="#5a3b21" font-weight="800">÷</text>
  </g>

  <!-- scattered dots -->
  <circle cx="18" cy="20" r="2.0" fill="#fff"/>
  <circle cx="46" cy="23" r="1.5" fill="#fff"/>
  <circle cx="21" cy="44" r="1.8" fill="#fff"/>
  <circle cx="43" cy="42" r="1.6" fill="#fff"/>
  <circle cx="31" cy="14" r="1.4" fill="#fff"/>

  <!-- floating numbers -->
  <text x="17" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffe6c4" font-weight="700">1</text>
  <text x="47" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffe6c4" font-weight="700">1</text>
  <text x="22" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffe6c4" font-weight="700">2</text>
  <text x="36" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffe6c4" font-weight="700">1</text>
  <text x="40" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffe6c4" font-weight="700">3</text>
</svg>